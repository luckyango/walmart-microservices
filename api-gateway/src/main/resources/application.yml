server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Expose-Headers, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "*"
            allowCredentials: false
      routes:
        - id: account-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/account,/api/account/**
          filters:
            - StripPrefix=2
        - id: item-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/items,/api/items/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders,/api/orders/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments,/api/payments/**
          filters:
            - StripPrefix=1

auth:
  jwt:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
